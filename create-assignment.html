<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tạo bài tập</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #f1f5f9;
      padding: 40px;
    }

    .container {
      max-width: 650px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 20px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #4338ca;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>📘 Giao bài tập     🎾 <a href="https://nhatnc80.github.io/portalsport/" style="text-decoration: none; color: blue;">Cổng học liệu</a></h2>

  <!-- Lesson -->
  <label>Bài học</label>
  <select id="lesson">
    <option value="">-- Chọn bài học --</option>
  </select>

  <!-- Title -->
  <input id="title" placeholder="Tiêu đề bài tập">

  <!-- Description -->
  <textarea id="desc" placeholder="Mô tả"></textarea>

  <!-- GitHub -->
  <input id="github" placeholder="GitHub repo template">

  <!-- Max score -->
  <input id="score" type="number" value="10">

  <!-- Due date -->
  <input id="due" type="datetime-local">

  <button onclick="create()">Tạo bài tập</button>
</div>

<script>
const sb = window.supabase.createClient(
  "https://zpvhxuwwgrtqbgziylbl.supabase.co",
  "sb_publishable_u0kVgF9XCLTk5tD9M_xj9w_9lKguAgf"
);

// 🔐 Check login
if (localStorage.getItem("role") !== "teacher") {
  alert("Bạn chưa đăng nhập!");
  window.location.href = "login.html";
}

// 🚀 Load lessons từ DB
async function loadLessons() {
  const { data, error } = await sb
    .from("lessons")
    .select("lesson_id, title")
    .order("lesson_id", { ascending: true });

  if (error) {
    console.error(error);
    alert("Không load được lesson");
    return;
  }

  const select = document.getElementById("lesson");

  data.forEach(l => {
    const opt = document.createElement("option");
    opt.value = l.lesson_id;
    opt.textContent = l.title;
    select.appendChild(opt);
  });
}

loadLessons();

// 🚀 Tạo bài tập
async function create() {
  const lesson_id = document.getElementById("lesson").value;
  const title = document.getElementById("title").value.trim();
  const desc = document.getElementById("desc").value.trim();
  const github = document.getElementById("github").value.trim();
  const score = document.getElementById("score").value;
  const due = document.getElementById("due").value;

  // ✅ Validate
  if (!lesson_id) {
    alert("Vui lòng chọn bài học");
    return;
  }

  if (!title) {
    alert("Tiêu đề không được để trống");
    return;
  }

  if (github && !github.includes("github.com")) {
    alert("Link GitHub không hợp lệ");
    return;
  }

  // ✅ Convert datetime
  let due_date = null;
  if (due) {
    due_date = due.replace("T", " ");
  }

  const { error } = await sb
    .from("assignments")
    .insert([{
      lesson_id: parseInt(lesson_id),
      title: title,
      description: desc,
      github_repo_url: github,
      max_score: parseInt(score || 10),
      due_date: due_date,
      updated_at: new Date().toISOString()
    }]);

  if (error) {
    console.error(error);
    alert("Lỗi: " + error.message);
  } else {
    alert("🎉 Tạo bài tập thành công!");

    // reset form
    document.getElementById("title").value = "";
    document.getElementById("desc").value = "";
    document.getElementById("github").value = "";
    document.getElementById("score").value = 10;
    document.getElementById("due").value = "";
  }
}
</script>

</body>
</html>
