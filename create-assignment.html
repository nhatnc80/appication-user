<!DOCTYPE html>
<html>
<head>
  <title>Create Assignment</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #f1f5f9;
      padding: 40px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>📘 Giao bài tập</h2>

  <input id="title" placeholder="Tiêu đề">
  <textarea id="desc" placeholder="Mô tả"></textarea>

  <input id="github" placeholder="GitHub repo (template)">
  <input id="due" type="datetime-local">

  <button onclick="create()">Tạo bài tập</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://zpvhxuwwgrtqbgziylbl.supabase.co",
  "sb_publishable_u0kVgF9XCLTk5tD9M_xj9w_9lKguAgf"
);

// check login
const teacher_id = localStorage.getItem("teacher_id");
if (!teacher_id) {
  window.location.href = "login.html";
}

async function create() {
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;
  const github = document.getElementById("github").value;
  const due = document.getElementById("due").value;

  const { error } = await supabase
    .from("assignments")
    .insert([{
      title: title,
      description: desc,
      github_repo_url: github,
      due_date: due,
      lesson_id: 1 // bạn có thể chọn dynamic
    }]);

  if (error) {
    alert("Lỗi: " + error.message);
  } else {
    alert("Tạo bài thành công!");
  }
}
</script>

</body>
</html>
