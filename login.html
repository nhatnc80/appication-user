<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>LMS Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at top, #1f1f2e, #0f0f18);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      width: 380px;
      padding: 40px;
      border-radius: 20px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(25px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
      color: white;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
    }

    select, input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 14px;
    }

    select option {
      color: black;
    }

    input::placeholder {
      color: #aaa;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg,#667eea,#764ba2);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .msg {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }

    .error { color: #ff6b6b; }
    .success { color: #4ade80; }
  </style>
</head>

<body>

<div class="login-box">
  <h2>🔐 LMS Login</h2>

  <!-- 🔥 SELECT ROLE -->
  <select id="role">
    <option value="student">🎓 Học sinh</option>
    <option value="teacher">👨‍🏫 Giáo viên</option>
  </select>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Mật khẩu">

  <button class="btn" onclick="login()">Đăng nhập</button>

  <div class="msg" id="msg"></div>
</div>

<script>
const SUPABASE_URL = "https://zpvhxuwwgrtqbgziylbl.supabase.co";
const SUPABASE_KEY = "sb_publishable_u0kVgF9XCLTk5tD9M_xj9w_9lKguAgf";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function login() {
  const role = document.getElementById("role").value;
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");

  msg.innerHTML = "";

  if (!email || !password) {
    msg.innerHTML = "<span class='error'>Vui lòng nhập đầy đủ thông tin</span>";
    return;
  }

  // 🔐 1. LOGIN AUTH
  const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (authError || !authData.user) {
    msg.innerHTML = "<span class='error'>Sai email hoặc mật khẩu</span>";
    return;
  }

  const userId = authData.user.id;

  // 🔥 2. CHECK CẢ 2 ROLE (BẢO MẬT)
  const { data: teacherData } = await supabase
    .from("teachers")
    .select("id")
    .eq("user_id", userId)
    .maybeSingle();

  const { data: studentData } = await supabase
    .from("students")
    .select("id")
    .eq("user_id", userId)
    .maybeSingle();

  // 🔥 3. VALIDATE ROLE
  if (role === "teacher" && !teacherData) {
    msg.innerHTML = "<span class='error'>Tài khoản không phải Giáo viên</span>";
    return;
  }

  if (role === "student" && !studentData) {
    msg.innerHTML = "<span class='error'>Tài khoản không phải Học sinh</span>";
    return;
  }

  // 🔥 4. Lưu role
  localStorage.setItem("role", role);

  msg.innerHTML = "<span class='success'>Đăng nhập thành công...</span>";

  // 🔥 5. REDIRECT
  setTimeout(() => {
    if (role === "teacher") {
      window.location.href = "https://nhatnc80.github.io/portalsport/";
    } else {
      window.location.href = "https://nhatnc80.github.io/portalsport/";
    }
  }, 800);
}
</script>

</body>
</html>
